# Regras para geração do graph.yml:
#
# 1. Toda API que exige autenticação deve ter uma aresta A PARTIR do nó de auth/login.
# 2. Toda API que depende de dados de uma resposta anterior deve ter uma aresta A PARTIR dessa API.
# 3. Os nós são derivados dos nomes lógicos das etapas identificadas durante a análise das APIs.
# 4. O grafo deve ser um DAG (Directed Acyclic Graph — Grafo Acíclico Dirigido) — ciclos não são permitidos.
# 5. Use kebab-case para os nomes dos nós (ex.: get-products, add-to-cart).
