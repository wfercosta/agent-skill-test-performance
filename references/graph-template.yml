# Template de Grafo de Sequência
# Define a ordem lógica de execução das chamadas de API em um cenário de teste de performance.
# Usado pela skill test-performance para gerar os arquivos <scenario_name>_graph.yml.

# nodes: lista ordenada de nomes das etapas de API (na sequência de execução)
nodes:
  - login
  - get-products
  - checkout

# edges: dependências direcionadas entre etapas de API
# Cada aresta indica que a etapa 'from' deve ser concluída antes de 'to' começar.
edges:
  - from: login
    to: get-products
  - from: get-products
    to: checkout

