# Template de Propriedades de Ambiente
# Usado pela skill test-performance para gerar os arquivos <scenario_name>.properties.
#
# Instruções:
#   - Preencha os valores antes de executar os testes.
#   - NÃO commite valores sensíveis (tokens, senhas) no controle de versão.
#   - Cada ambiente (dev, hom) possui seu próprio arquivo .properties.
#   - Os valores são carregados em tempo de execução pelo JMeter via CSV Data Set Config ou
#     como propriedades JMeter (passadas via flag -J ou user.properties).

# -----------------------------------------------------------------------
# URL Base
# A URL raiz da aplicação em teste (sem barra final).
# Exemplo: https://api.myapp.dev.internal
# -----------------------------------------------------------------------
base_url=

# -----------------------------------------------------------------------
# Autenticação
# Bearer token ou API key para endpoints autenticados.
# Para fluxos OAuth, obtenha este token antes de executar o teste.
# Exemplo: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
# -----------------------------------------------------------------------
auth_token=

# -----------------------------------------------------------------------
# Identificação do Cliente
# O client_id usado em fluxos OAuth2 ou cabeçalhos de identificação do API Gateway.
# Exemplo: my-service-client-dev
# -----------------------------------------------------------------------
client_id=

# -----------------------------------------------------------------------
# Propriedades adicionais específicas por ambiente (adicione conforme necessário)
# -----------------------------------------------------------------------

# Configurações de timeout (milissegundos)
# connect_timeout=5000
# response_timeout=30000

# Versão da API ou prefixo de roteamento (se aplicável)
# api_version=v1
# api_prefix=/api/${api_version}

# Feature flags ou marcadores de ambiente
# environment=dev
